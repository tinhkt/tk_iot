name: tk_iot
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  mqtt_client: ^10.11.11
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  window_manager: ^0.5.1
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.3
  app_settings: ^7.0.0
  flutter_secure_storage: ^9.2.4
  permission_handler: ^11.4.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_app.png"
  # [ADAPTIVE ICON — Android 8+] Bắt buộc khai đủ CẶP background+foreground:
  # đợt cấu hình trước sinh ra drawable ic_launcher_foreground + colors.xml nhưng
  # THIẾU mipmap-anydpi-v26/ic_launcher.xml -> launcher đời mới không có icon
  # adaptive hợp lệ để dùng. Khai đủ ở đây để generator sinh trọn bộ nhất quán.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon_app.png"
  # Tránh lỗi kênh alpha trên iOS App Store (ITMS-90717)
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/icon_app.png