name: tk_iot
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  mqtt_client: ^10.11.11
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  window_manager: ^0.5.1
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.3
  app_settings: ^7.0.0
  flutter_secure_storage: ^9.2.4
  permission_handler: ^11.4.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon_app.png"
  # iOS App Store CẤM icon có kênh alpha (lỗi ITMS-90717) — tool tự ép nền đặc màu trắng
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF" # Màu nền lớp dưới của adaptive icon Android 8+
  # Lớp trên adaptive icon: Android chỉ giữ ~66% vùng giữa (safe zone) rồi cắt khuôn tròn.
  # Nếu chóp mái nhà bị xén trên máy thật: xuất thêm bản icon_app_foreground.png 1024x1024
  # với logo thu nhỏ ~660px ở giữa (rìa trong suốt) rồi trỏ dòng dưới vào file đó.
  adaptive_icon_foreground: "assets/images/icon_app.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png